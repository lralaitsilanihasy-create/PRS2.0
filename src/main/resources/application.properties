spring.application.name=prs

# --- PostgreSQL ---
spring.datasource.url=jdbc:postgresql://localhost:5432/DBPRS20
spring.datasource.username=postgres
# Mot de passe : NE JAMAIS committer en clair. Le fournir via la variable
# d'environnement DB_PASSWORD (ex. PowerShell : $env:DB_PASSWORD="...").
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
# Les colonnes du MLD sont en MAJUSCULES (sensibles a la casse en base) :
# on force Hibernate a citer tous les identifiants pour respecter la casse exacte.
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

# --- Upload de fichiers (pieces jointes d'inscription PRMP : arrete, CIN, photo) ---
# Tailles max par fichier et par requete multipart (scans PDF/JPEG/PNG).
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=25MB

# --- Securite / JWT ---
# Secret HMAC HS256 : DOIT faire >= 32 octets. A surcharger en prod via la
# variable d'environnement APP_JWT_SECRET (ne jamais committer un vrai secret).
app.jwt.secret=${APP_JWT_SECRET:dev-secret-please-change-0123456789-abcdefghij}
# Duree de validite du token en secondes (8 h par defaut).
app.jwt.expiration-seconds=28800

# --- E-mail (envoi réel des notifications) ---
# Désactivé par défaut : les notifications sont écrites en base mais pas expédiées.
# Mettre à true ET renseigner spring.mail.* ci-dessous pour activer l'envoi SMTP.
app.mail.enabled=false
app.mail.from=no-reply@cnm.mg
# spring.mail.host=smtp.exemple.mg
# spring.mail.port=587
# spring.mail.username=${MAIL_USER}
# spring.mail.password=${MAIL_PASSWORD}
# spring.mail.properties.mail.smtp.auth=true
# spring.mail.properties.mail.smtp.starttls.enable=true

# --- Stockage fichiers (FSX) ---
# Repertoire racine de stockage des documents generes (surcharger en prod via STORAGE_FSX_BASE_PATH).
storage.fsx.base-path=${STORAGE_FSX_BASE_PATH:${java.io.tmpdir}/prs-fsx}
# Lettres de renvoi signees (PDF), sous-repertoire LR/.
storage.lettre-renvoi.path=${storage.fsx.base-path}/LR
# Projets de PV (PDF), sous-repertoire PV/.
storage.pv-examen.path=${storage.fsx.base-path}/PV

# --- Seed de comptes (DEV uniquement) ---
# Si true : cree au demarrage un compte t_compte_auth par controleur et par PRMP
# (login = matricule / ID PRMP, meme mot de passe ci-dessous). Idempotent. NE PAS activer en prod.
app.seed.comptes.enabled=false
app.seed.comptes.password=Test@1234

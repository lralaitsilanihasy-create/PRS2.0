# Configuration de test : base H2 en mémoire (mode PostgreSQL), isolée de DBPRS20.
# Ce fichier (classpath de test) remplace celui de src/main/resources pour les tests.
spring.application.name=prs-test

# INIT crée un domaine "text" (cité) car globally_quoted_identifiers cite aussi le type
# de colonne `columnDefinition="text"` — type natif de PostgreSQL, absent de H2.
# INIT crée aussi les 3 séquences d'allocation de PK (Voie B) — équivalent H2 de la migration Postgres.
spring.datasource.url=jdbc:h2:mem:prstest;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;INIT=CREATE DOMAIN IF NOT EXISTS "text" AS VARCHAR\\;CREATE SEQUENCE IF NOT EXISTS seq_dossier START WITH 100001\\;CREATE SEQUENCE IF NOT EXISTS seq_ppm START WITH 200001\\;CREATE SEQUENCE IF NOT EXISTS seq_marche START WITH 300001
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
# Mêmes identifiants cités qu'en prod (colonnes MAJUSCULES) pour rester cohérent.
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Secret JWT de test (>= 32 octets).
app.jwt.secret=test-secret-please-change-0123456789-abcdefghij
app.jwt.expiration-seconds=3600

# Pas de seed automatique en test (les fixtures sont créées par les tests).
app.seed.comptes.enabled=false
